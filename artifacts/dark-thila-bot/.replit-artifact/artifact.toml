kind = "web"
previewPath = "/"
title = "Dark Thila Bot"
version = "1.0.0"
id = "artifacts/dark-thila-bot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18098

[services.development]
run = "pnpm --filter @workspace/dark-thila-bot run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dark-thila-bot", "run", "build" ]
publicDir = "artifacts/dark-thila-bot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18098"
BASE_PATH = "/"
